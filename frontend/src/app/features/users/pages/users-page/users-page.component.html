<div class="page">
  <div class="content">
    <div class="page-header">
      <h1 class="title">Пользователи</h1>

      <button
        mat-stroked-button
        color="primary"
        class="add"
        type="button"
        (click)="openCreateUserDialog()"
      >
        <mat-icon class="i">person_add</mat-icon>
        Добавить пользователя
      </button>
    </div>
    <p class="state error" *ngIf="error()">{{ error() }}</p>

    <div class="list" *ngIf="!loading()">
      <app-user-card
        *ngFor="let u of items()"
        [user]="u"
        (open)="onOpenUser($event)"
        (toggleBlock)="onToggleBlock($event)"
      ></app-user-card>
    </div>

    <app-pagination
      [page]="page()"
      [pageSize]="pageSize()"
      [totalCount]="totalCount()"
      (pageChange)="onPageChange($event)"
    ></app-pagination>
  </div>
</div>
