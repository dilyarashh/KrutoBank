<form class="form" [formGroup]="form" (ngSubmit)="submit()">
  <label class="field">
    <span class="label">Номер телефона</span>

    <div class="control" [class.invalid]="phoneInvalid()">
      <input
        class="input"
        type="tel"
        formControlName="phone"
        autocomplete="tel"
        placeholder="+7 999 123-45-67"
      />

      <mat-icon class="icon" aria-hidden="true">phone</mat-icon>
    </div>

    <span class="hint error" *ngIf="phoneInvalid()">
      {{ phoneErrorText() }}
    </span>
  </label>

  <label class="field">
    <span class="label">Пароль</span>

    <div class="control" [class.invalid]="passwordInvalid()">
      <input
        class="input"
        [type]="passwordHidden() ? 'password' : 'text'"
        formControlName="password"
        autocomplete="current-password"
        placeholder="••••••"
      />

      <button
        type="button"
        class="icon-btn"
        (click)="togglePassword()"
        [attr.aria-label]="passwordHidden() ? 'Показать пароль' : 'Скрыть пароль'"
      >
        <mat-icon>
          {{ passwordHidden() ? 'visibility' : 'visibility_off' }}
        </mat-icon>
      </button>
    </div>

    <span class="hint error" *ngIf="passwordInvalid()">
      {{ passwordErrorText() }}
    </span>
  </label>

  <button mat-raised-button color="primary" class="full" type="submit" [disabled]="disabled()">
    <mat-icon class="btn-icon">login</mat-icon>
    Вход
  </button>

  <p class="error" *ngIf="errorText()">{{ errorText() }}</p>
</form>
