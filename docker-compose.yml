version: '3.9'

services:
  users-db:
    image: postgres:16
    container_name: users-db
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55433:5432"
    volumes:
      - users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  accounts-db:
    image: postgres:16
    container_name: accounts-db
    environment:
      POSTGRES_DB: accountsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55434:5432"
    volumes:
      - accounts_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  credits-db:
    image: postgres:16
    container_name: credits-db
    environment:
      POSTGRES_DB: creditsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55435:5432"
    volumes:
      - credits_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  users-api:
    build:
      context: .
      dockerfile: UsersService/Dockerfile
    container_name: users-api
    depends_on:
      users-db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=users-db;Port=5432;Database=usersdb;Username=postgres;Password=postgres"
    ports:
      - "5001:8080"

  accounts-api:
    build:
      context: .
      dockerfile: AccountsService/Dockerfile
    container_name: accounts-api
    depends_on:
      accounts-db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=accounts-db;Port=5432;Database=accountsdb;Username=postgres;Password=postgres"
    ports:
      - "5002:8080"

  credits-api:
    build:
      context: .
      dockerfile: CreditsService/Dockerfile
    container_name: credits-api
    depends_on:
      credits-db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=credits-db;Port=5432;Database=creditsdb;Username=postgres;Password=postgres"
    ports:
      - "5003:8080"

volumes:
  users_data:
  accounts_data:
  credits_data: